services:
  db:
    image: mysql:8.0
    container_name: vione_mysql
    restart: always
    environment:
      MYSQL_DATABASE: vione_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: vione_backend
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env        # ← lê direto do seu .env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend_react
      args:
        VITE_API_URL: "http://localhost:3000"
    container_name: vione_frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mysql_data: